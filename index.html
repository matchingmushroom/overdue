<body>
<div id="loader" class="hidden"><div class="spinner"></div></div>
<div id="offlineBanner" class="offline-banner hidden">⚠️ You are offline. Showing cached data.</div>

<header>
  <div class="app-title">
    <i class="material-icons-round">account_balance</i> Overdue Report
    <span id="offlineIndicator" class="offline-badge hidden">Offline</span>
  </div>
</header>

<main>
  <!-- Same view structure as before -->
</main>

<nav class="bottom-nav">
  <!-- Same navigation -->
</nav>

<!-- Modals (share, reminder) unchanged -->

<script>
  // ========== CONFIGURATION ==========
  const API_BASE = 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec'; // Replace with your Apps Script deployment URL

  // ========== INDEXEDDB SETUP ==========
  const db = new Dexie("CRM_DB");
  db.version(1).stores({
    customers: "id",
    metrics: "CIF_ID",
    groups: "groupName",
    extraDetails: "CIF_ID",
    overdueDetails: "CIF_ID",
    slicerOptions: "CIF_ID"
  });

  // ========== API HELPER ==========
  async function apiCall(action, params = {}) {
    if (!navigator.onLine) throw new Error('Offline');
    const url = new URL(API_BASE);
    url.searchParams.set('action', action);
    Object.entries(params).forEach(([k, v]) => {
      if (Array.isArray(v)) url.searchParams.set(k, JSON.stringify(v));
      else url.searchParams.set(k, v);
    });
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    return data;
  }

  // ========== CACHING LOGIC ==========
  async function syncAllData() {
    try {
      const customers = await apiCall('customers');
      await db.customers.bulkPut(customers);
      console.log('Customers synced');
    } catch(e) { console.warn('Sync customers failed', e); }
  }

  // ========== UI FUNCTIONS (adapted to use cache-first + network) ==========
  // Implement loadCustomerList, loadDetails, loadGroupDetails etc. using Dexie and fallback to API.

  // ... (Due to length, I'll provide the critical cache-first pattern)

  async function loadCustomerList() {
    const cached = await db.customers.toArray();
    if (cached.length) {
      customers = cached;
      setupSearch();
    }
    if (navigator.onLine) {
      try {
        const fresh = await apiCall('customers');
        await db.customers.bulkPut(fresh);
        customers = fresh;
        setupSearch();
      } catch(e) { /* ignore */ }
    }
  }

  // ========== OFFLINE DETECTION ==========
  function updateOnlineStatus() {
    const banner = document.getElementById('offlineBanner');
    const indicator = document.getElementById('offlineIndicator');
    if (navigator.onLine) {
      banner.classList.add('hidden');
      indicator.classList.add('hidden');
    } else {
      banner.classList.remove('hidden');
      indicator.classList.remove('hidden');
    }
  }
  window.addEventListener('online', updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);
  updateOnlineStatus();

  // ========== SERVICE WORKER ==========
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }

  // ========== INIT ==========
  window.onload = () => {
    loadCustomerList();
    if (navigator.onLine) syncAllData();
  };
</script>
</body>
</html>
